<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Spotify">
  <defs>
    <radialGradient id="halo" cx="38%" cy="28%" r="70%">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.38" stop-color="#bdbdbd"/>
      <stop offset="0.72" stop-color="#171717"/>
      <stop offset="1" stop-color="#030303"/>
